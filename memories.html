<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
body{
background:linear-gradient(135deg,#ffe0ec,#ffd1dc,#fff5f8);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
width:100%;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin:30px 0;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.15);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.message{
font-size:18px;
line-height:1.8;
margin:25px 0;
color:#444;
}

.btn{
display:inline-block;
margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>❤️ Our Beautiful Memories ❤️</h1>

<p class="message">
Every smile of yours is precious. 🌸<br><br>
Thank you for being such an amazing best friend.
May Allah always bless you with happiness, success and endless smiles.
I hope this birthday becomes one of your happiest memories. 🎂✨
</p>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
<img src="photo4.jpeg">
<img src="photo5.jpeg">
</div>

<a href="surprise.html" class="btn">
Open Your Surprise 🎁
</a>

</div>

</body>
</html>
