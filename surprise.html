<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Surprise For Sumera</title>
<link rel="stylesheet" href="style.css">

<style>
body{
background:linear-gradient(135deg,#ffb6c1,#ffd6e8,#fff);
overflow:hidden;
}

.container{
text-align:center;
}

#letter{
font-size:20px;
line-height:1.8;
color:#444;
margin:25px 0;
min-height:220px;
}

button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff2d75;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff0055;
}

.confetti{
position:absolute;
top:-20px;
font-size:22px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0);}
100%{transform:translateY(110vh) rotate(720deg);}
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Sumera ❤️</h1>

<p id="letter"></p>

<button onclick="celebrate()">🎁 Open My Gift</button>

</div>

<script>

const msg =
`Dear Sumera ❤️

Happy Birthday!

May Allah bless you with happiness, success, good health and endless smiles.

Thank you for being such an amazing best friend.

Keep smiling, keep shining and never stop believing in yourself.

Enjoy your special day!

With Love,
Ahmad ❤️`;

let i=0;

function type(){
if(i<msg.length){
document.getElementById("letter").innerHTML+=msg.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

function celebrate(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=["🎉","🎊","❤️","✨","🎈"][Math.floor(Math.random()*5)];

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(c);

}

alert("🎂 Happy Birthday Sumera! ❤️🥳");
}

</script>

</body>
</html>
